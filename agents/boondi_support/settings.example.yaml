# Drop these blocks into ~/gantry/settings.yaml to register the Shopify MCP
# server and Boondi agent with the Gantry runtime.

mcp_servers:
  shopify-api:
    transport: http
    url: http://127.0.0.1:8081/mcp
    risk_class: medium
    allowed_tool_patterns:
      - lookup_customer
      - get_order
      - list_orders_for_customer
      - get_order_history
      - search_products
      - get_product
      - check_inventory
      - validate_discount_code
    auto_approve_tool_patterns:
      - lookup_*
      - get_*
      - list_*
      - search_*
      - check_*
      - validate_*
    credential_refs:
      - name: SHOPIFY_DEV_SHOP_DOMAIN
        target: env
        key: SHOPIFY_DEV_SHOP_DOMAIN
      - name: SHOPIFY_DEV_CLIENT_ID
        target: env
        key: SHOPIFY_DEV_CLIENT_ID
      - name: SHOPIFY_DEV_CLIENT_SECRET
        target: env
        key: SHOPIFY_DEV_CLIENT_SECRET

agents:
  boondi_support:
    name: "Boondi"
    folder: boondi_support
    persona: sales
    model: sonnet
    one_time_model: haiku
    bindings: {}
    capabilities:
      tool_ids: []
      skill_ids:
        - boondi-kb
      mcp_server_ids:
        - shopify-api
